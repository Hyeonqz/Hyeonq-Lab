# 이 모듈은 실행 가능한 부트 앱이 아니라 예제 라이브러리다.
# JPA 예제를 @DataJpaTest 나 별도 테스트 컨텍스트로 돌릴 때 사용할 MySQL 설정.
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/hyeonqz_architecture?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&createDatabaseIfNotExist=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
