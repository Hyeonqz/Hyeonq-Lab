server:
  port: 12000

spring:
  application:
    name: jpa-best-example
  jmx:
    enabled: true

  datasource:
    url: jdbc:mysql://localhost:3306/jpa_example_lab?useSSL=false&useUnicode=true&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root1234

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate: # logger 를 통해 로그 출력
        show_sql: true # sql 보여주는 설정
        format_sql: true # sql 정렬
    defer-datasource-initialization: false # data.sql 또는 schema.sql 이 있을 때 사용한다.
    open-in-view: false

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm:jdbc.bind: trace # ? 파라미터 출력
    org.hibernate.orm.connections.pooling: WARN