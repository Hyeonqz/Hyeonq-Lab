server:
  port: 9300

spring:
  config:
    imports:
      - application-secret.yml
      - datasoruce/datasource.yml
      - monitor/monitor.yml
      - logging/logging.yml

  # spring ai
  ai:
    openai:
      api-key: ${hkhjin.key}
      chat:
        options:
          model: gpt-3.5-turbo
      base-url: https://api.openai.com/v1/chat/completions

  # 스케쥴러 사이즈 조절
  task:
    scheduling:
      pool:
        size: 5