server:
  port: 9300

# logging
logging:
  level:
    root: INFO
    org.hyeonqz.springlab: DEBUG

spring:
  config:
    imports:
      - application-secret.yml
      - datasoruce/datasource.yml
      - ai/ai.yml

  # spring ai
  ai:
    openai:
      api-key: ${hkhjin.key}
      chat:
        options:
          model: gpt-3.5-turbo
      base-url: https://api.openai.com/v1/chat/completions

  # 스케쥴러 사이즈 조절
  task:
    scheduling:
      pool:
        size: 5

# spring actuator
management:
  endpoint:
    health:
      show-details: always

  endpoints:
    web:
      exposure:
        include: "*"

# decorator
decorator:
  # p6spy
  datasource:
    enabled: false
    p6spy:
      enable-logging: true
      multiline: true
      logging: slf4j

    # proxy
    datasource-proxy:
      logging: slf4j
      query:
        enable-logging: true
        log-level: DEBUG
      slow-query:
        enable-logging: true
        log-level: WARN
        threshold: 1000
      multiline: true
      format-sql: true
      count-query: true # 쿼리 메트릭 실행